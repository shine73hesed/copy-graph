                    content: `# 치매 (Dementia)

## 정의

치매(Dementia)는 후천적으로 뇌의 기질적 병변에 의해 **기억력, 판단력, 언어 능력** 등 여러 인지 기능이 저하되어 일상생활에 지장을 초래하는 임상 증후군이다. 단일 질병이 아니라 다양한 원인 질환에 의해 발생하는 **증상의 집합**이다.

## 원인 및 분류

치매의 원인은 매우 다양하며, 크게 **퇴행성 치매**와 **비퇴행성 치매**로 분류된다.

- **퇴행성 치매**: 알츠하이머병(60~70%), 루이소체 치매, 전두측두엽 치매
- **혈관성 치매**: 뇌졸중, 소혈관 질환에 의한 치매 (20~30%)
- **기타**: 갑상선 기능 저하, 비타민 B12 결핍, 정상압 수두증 등 (일부 가역적)

## 주요 증상

| 영역 | 증상 |
|------|------|
| 기억력 | 최근 일을 잊음, 반복 질문 |
| 지남력 | 시간, 장소, 사람 혼동 |
| 언어 | 단어를 찾지 못함, 대화 이해 어려움 |
| 판단력 | 의사결정 장애, 금전 관리 어려움 |
| 행동 | 배회, 공격성, 일몰증후군 |

## 진단

                    bg: "#ECFDF5",
                    match: (t) => {
                        const l = (t.title || t.id).toLowerCase();
                        return [
                            "도네페질",
                            "리바스티그민",
                            "메만틴",
                            "콜린",
                            "약물",
                            "항정신",
                            "억제제",
                        ].some((k) => l.includes(k));
                    },
                },
                {
                    id: "nursing",
                    label: "간호 중재",
                    icon: "health_and_safety",
                    color: "#4F6AF6",
                    bg: "#EEF1FE",
                    match: (t) => {
                        const l = (t.title || t.id).toLowerCase();
                        return [
                            "간호",
                            "중재",
                            "의사소통",
                            "환경",
                            "비약물",
                            "돌봄",
                            "케어",
                            "전략",
                        ].some((k) => l.includes(k));
                    },
                },
                {
                    id: "diagnostics",
                    label: "진단·검사",
                    icon: "biotech",
                    color: "#F43F5E",
                    bg: "#FFF1F2",
                    match: (t) => {
                        const l = (t.title || t.id).toLowerCase();
                        return [
                            "mmse",
                            "moca",
                            "pet",
                            "mri",
                            "진단",
                            "검사",
                            "선별",
                            "평가도구",
                        ].some((k) => l.includes(k));
                    },
                },
                {
                    id: "pathology",
                    label: "병태·기전",
                    icon: "science",
                    color: "#7C5CFC",
                    bg: "#F3EFFF",
                    match: (t) => {
                        const l = (t.title || t.id).toLowerCase();
                        return [
                            "아밀로이드",
                            "타우",
                            "신경",
                            "뇌",
                            "해마",
                            "시냅스",
                            "퇴행",
                            "단백질",
                            "세포",
                            "병태",
                        ].some((k) => l.includes(k));
                    },
                },
            ];
            function categorizeTocDoc(doc) {
                for (const d of DOMAINS_WIKI) if (d.match(doc)) return d.id;
                return "overview";
            }
            let _tocFolderOpen = {};
            DOMAINS_WIKI.forEach((d) => (_tocFolderOpen[d.id] = true));

            // ═══ INIT ═══
            function init() {
                document.getElementById("tocCnt").textContent =
                    DOCS.length + "개 교재";
                document.getElementById("tocRead").textContent =
                    readSet.size + "개 읽음";
                renderToc(DOCS);

                // Try loading from API too (append if available)
                tryLoadAPI();
            }

            async function tryLoadAPI() {
                try {
                    const API = ALE.API,
                        TOKEN = ALE.TOKEN;
                    const r = await fetch(API + "/textbook/list", {
                        headers: { Authorization: "Bearer " + TOKEN },
                    });
                    const d = await r.json();
                    const apiDocs = (d.textbooks || []).filter(
                        (t) => !DOCS.find((x) => x.id === t.node_id),
                    );
                    for (const t of apiDocs) {
                        try {
                            const cr = await fetch(
                                API +
                                    "/textbook/content/" +
                                    encodeURIComponent(t.node_id),
                                {
                                    headers: {
                                        Authorization: "Bearer " + TOKEN,
                                    },
                                },
                            );
                            const cd = await cr.json();
                            if (cd.content)
                                DOCS.push({
                                    id: t.node_id,
                                    title: t.title || t.node_id,
                                    related: [],
                                    content: cd.content,
                                });
                        } catch (e) {}
                    }
                    if (apiDocs.length) {
                        document.getElementById("tocCnt").textContent =
                            DOCS.length + "개 교재";
                        renderToc(DOCS);
                    }
                } catch (e) {
                    /* API not available, use hardcoded only */
                }
            }

            function renderToc(items, forceOpenDomains) {
                // Group by domain
                const groups = {};
                DOMAINS_WIKI.forEach((d) => (groups[d.id] = []));
                items.forEach((t) => {
                    const did = categorizeTocDoc(t);
                    if (groups[did]) groups[did].push(t);
                    else groups["overview"].push(t);
                });

                if (forceOpenDomains) {
                    DOMAINS_WIKI.forEach(
                        (d) =>
                            (_tocFolderOpen[d.id] = forceOpenDomains.has(d.id)),
                    );
                }

                let html = "";
                let globalNum = 0;
                DOMAINS_WIKI.forEach((d) => {
                    const list = groups[d.id];
                    if (!list.length && !forceOpenDomains) return;
                    const isOpen = _tocFolderOpen[d.id] !== false;
                    const chevron = isOpen ? "expand_more" : "chevron_right";

                    html += `<div style="margin-bottom:4px">
      <div onclick="toggleTocFolder('${d.id}')" style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:14px;cursor:pointer;transition:all .15s;user-select:none" onmouseover="this.style.background='rgba(0,0,0,.025)'" onmouseout="this.style.background=''">
        <span class="material-symbols-outlined" style="font-size:18px;color:${d.color}">${d.icon}</span>
        <span style="font-size:12px;font-weight:800;flex:1;color:var(--text)">${d.label}</span>
        <span style="font-size:10px;font-weight:700;color:${d.color};background:${d.bg};padding:2px 8px;border-radius:6px">${list.length}</span>
        <span class="material-symbols-outlined" style="font-size:16px;color:var(--text3);transition:transform .2s">${chevron}</span>
      </div>
      <div style="overflow:hidden;max-height:${isOpen ? list.length * 44 + "px" : "0"};transition:max-height .25s ease;padding-left:6px">`;

                    list.forEach((t) => {
                        globalNum++;
                        const realIdx = DOCS.indexOf(t);
                        const isActive = realIdx === curIdx;
                        const isRead = readSet.has(t.id);
                        html += `<div class="toc-item${isActive ? " active" : ""}" onclick="sel(${realIdx})" style="border-left:2px solid ${isActive ? d.color : "transparent"};margin-left:8px;transition:all .15s">
        <div class="num" style="${isActive ? "background:" + d.color + ";color:white" : isRead ? "background:" + d.bg + ";color:" + d.color : ""}">${isRead && !isActive ? '<span class="material-symbols-outlined" style="font-size:14px;color:' + d.color + '">check</span>' : globalNum}</div>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</span>
      </div>`;
                    });
                    html += `</div></div>`;
                });

                document.getElementById("tocList").innerHTML = html;
            }

            function toggleTocFolder(domainId) {
                _tocFolderOpen[domainId] = !(
                    _tocFolderOpen[domainId] !== false
                );
                renderToc(DOCS);
            }

            function filterToc() {
                const q = document
                    .getElementById("tocSearch")
                    .value.toLowerCase();
                if (!q) {
                    renderToc(DOCS);
                    return;
                }
                const filtered = DOCS.filter(
                    (t) =>
                        t.title.toLowerCase().includes(q) ||
                        t.id.toLowerCase().includes(q),
                );
                const openDomains = new Set();
                filtered.forEach((t) => openDomains.add(categorizeTocDoc(t)));
                renderToc(filtered, openDomains);
            }

            // ═══ SELECT ═══
            function sel(idx) {
                if (idx < 0 || idx >= DOCS.length) return;
                curIdx = idx;
                const doc = DOCS[idx];
                readSet.add(doc.id);
                try {
                    localStorage.setItem(
                        "ale_read",
                        JSON.stringify([...readSet]),
                    );
                } catch (e) {}
                document.getElementById("tocRead").textContent =
                    readSet.size + "개 읽음";
                renderToc(DOCS);

                document.getElementById("bcTitle").textContent = doc.title;
                document.getElementById("navCtr").textContent =
                    idx + 1 + "/" + DOCS.length;
                updNav();

                document.getElementById("empty").style.display = "none";
                const body = document.getElementById("artBody");
                body.style.display = "block";
                body.innerHTML = marked.parse(doc.content);
                body.className = "prose fade";
                document.getElementById("artWrap").scrollTop = 0;
                document.getElementById("readBar").style.width = "0%";

                showMeta(doc);
            }

            function showMeta(doc) {
                document.getElementById("metaP").style.display = "flex";
                document.getElementById("mSize").textContent =
                    doc.content.length.toLocaleString() + "자";
                const heads = doc.content.match(/^##\s+.+/gm) || [];
                document.getElementById("mSec").textContent =
                    heads.length + "개";
                document.getElementById("mTime").textContent =
                    "약 " +
                    Math.max(1, Math.round(doc.content.length / 400)) +
                    "분";

                document.getElementById("outl").innerHTML = heads.length
                    ? heads
                          .map((h) => {
                              const t = h.replace(/^#{2,3}\s+/, "");
                              return `<a class="outline-link" onclick="scrollH('${t.replace(/'/g, "\\'")}')"> ${t}</a>`;
                          })
                          .join("")
                    : '<span style="font-size:12px;color:var(--text3)">섹션 없음</span>';

                const rc = document.getElementById("relC");
                const rels = doc.related || [];
                if (rels.length) {
                    rc.innerHTML = rels
                        .map((r) => {
                            const ri = DOCS.findIndex(
                                (d) => d.id === r || d.title.includes(r),
                            );
                            return ri >= 0
                                ? `<span class="rel-chip" onclick="sel(${ri})">${r}</span>`
                                : `<span class="rel-chip" style="opacity:.5;cursor:default">${r}</span>`;
                        })
                        .join("");
                } else {
                    const nearby = DOCS.filter(
                        (d, i) => Math.abs(i - curIdx) <= 2 && i !== curIdx,
                    ).slice(0, 3);
                    rc.innerHTML = nearby
                        .map(
                            (d) =>
                                `<span class="rel-chip" onclick="sel(${DOCS.indexOf(d)})">${d.title.split("(")[0].trim()}</span>`,
                        )
                        .join("");
                }
            }

            function scrollH(title) {
                const hs = document
                    .getElementById("artBody")
                    .querySelectorAll("h2,h3");
                for (const h of hs) {
                    if (h.textContent.trim() === title) {
                        h.scrollIntoView({
                            behavior: "smooth",
                            block: "start",
                        });
                        h.style.background = "var(--yellow-bg)";
                        h.style.borderRadius = "8px";
                        h.style.padding = "4px 8px";
                        h.style.transition = "all .3s";
                        setTimeout(() => {
                            h.style.background = "";
                            h.style.padding = "";
                        }, 1500);
                        break;
                    }
                }
            }

            function nav(d) {
                sel(curIdx + d);
            }
            function updNav() {
                const p = document.getElementById("prevBtn"),
                    n = document.getElementById("nextBtn");
                p.disabled = curIdx <= 0;
                p.style.opacity = curIdx <= 0 ? ".4" : "1";
                n.disabled = curIdx >= DOCS.length - 1;
                n.style.opacity = curIdx >= DOCS.length - 1 ? ".4" : "1";
            }
            function onScroll() {
                const el = document.getElementById("artWrap");
                const pct =
                    (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
                document.getElementById("readBar").style.width =
                    Math.min(100, pct || 0) + "%";
            }
            function fSize(d) {
                baseFSize = Math.max(12, Math.min(22, baseFSize + d));
                document.getElementById("artBody").style.fontSize =
                    baseFSize + "px";
            }
            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowLeft") nav(-1);
                if (e.key === "ArrowRight") nav(1);
            });

            init();
        </script>
    </body>
</html>
